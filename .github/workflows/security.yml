name: Security Scan

on:
  schedule:
    - cron: '0 * * * *' # every hour
  workflow_dispatch:
  pull_request:
    branches: ['main']

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  trivy:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Run Trivy (table output)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-table.txt
          exit-code: '0'
          severity: CRITICAL,HIGH
          vuln-type: library

      - name: Run Trivy (SARIF)
        id: trivy-sarif
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          exit-code: '1'
          severity: CRITICAL,HIGH
          vuln-type: library
          limit-severities-for-sarif: true

      - name: Generate issue body
        if: steps.trivy-sarif.outcome == 'failure' && github.event_name != 'pull_request'
        run: python3 .github/scripts/generate-vuln-report.py
        env:
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SCAN_DATE: ${{ github.run_started_at }}

      - name: Create or update security issue
        if: steps.trivy-sarif.outcome == 'failure' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create security --color d73a4a --description "Security vulnerabilities" 2>/dev/null || true

          EXISTING=$(gh issue list \
            --label security \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          NEW_FP=$(cat vuln-fingerprint.txt)

          if [ -n "$EXISTING" ]; then
            OLD_FP=$(gh issue view "$EXISTING" --json body --jq '.body' \
              | grep -o 'vuln-fingerprint: [^-]*-->' \
              | sed 's/vuln-fingerprint: //;s/ -->//')

            if [ "$NEW_FP" = "$OLD_FP" ]; then
              echo "Vulnerabilities unchanged — skipping comment on issue #$EXISTING"
            else
              gh issue comment "$EXISTING" --body-file issue-body.md
              echo "Findings changed — commented on issue #$EXISTING"
            fi
          else
            gh issue create \
              --title "[Security] Vulnerabilities detected – $(date +%Y-%m-%d)" \
              --body-file issue-body.md \
              --label security
          fi

      - name: Close security issue if scan is clean
        if: steps.trivy-sarif.outcome == 'success' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list \
            --label security \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" \
              --comment "✅ Security scan passed — no CRITICAL or HIGH vulnerabilities detected. Closing."
            echo "Closed issue #$EXISTING"
          fi

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
